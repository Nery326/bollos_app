{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <h2>Registrar Entrega</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Pedido</label>
            <select name="pedido" id="pedido" class="form-select">
                {% for p in pedidos %}
                    <option value="{{ p.pedido.id }}">
                        {{ p.pedido.cliente.nombre }} - Pedidos: {{ p.pedido.cantidad }} - Entregados: {{ p.total_entregado }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Cantidad entregada</label>
            <input type="number" name="cantidad_entregada" id="cantidad_entregada" class="form-control" value="1" min="1">
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" name="pagado" id="pagado" class="form-check-input">
            <label for="pagado" class="form-check-label">Pagado</label>
        </div>

        <button type="submit" class="btn btn-primary">Registrar Entrega</button>
    </form>
</div>
{% endblock %}
