{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm rounded-4 mx-auto text-center" style="max-width: 500px;">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-3">Eliminar Cliente</h4>
            <p>¿Estás seguro que deseas eliminar al cliente <strong>{{ cliente.nombre }}</strong>?</p>

            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger me-2">Sí, eliminar</button>
                <a href="{% url 'lista_clientes' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
