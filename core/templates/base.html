<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bollos App - Panel</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        /* SIDEBAR */
        .sidebar{
            width:260px;
            height:100vh;
            position:fixed;
            background:#111827;
            color:white;
            padding-top:20px;
        }

        .sidebar .logo{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
            font-size:1.5rem;
            color:#22c55e;
        }

        .sidebar a{
            display:block;
            color:#d1d5db;
            text-decoration:none;
            padding:14px 25px;
            font-size:15px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1f2937;
            color:white;
        }

        .sidebar a i{
            margin-right:10px;
        }

        .sidebar .user-menu{
            position:absolute;
            bottom:20px;
            width:100%;
            padding:0 25px;
        }

        .sidebar .user-menu .dropdown-toggle{
            width:100%;
            color:#d1d5db;
            background:none;
            border:none;
            text-align:left;
            padding:14px 0;
        }

        .sidebar .user-menu .dropdown-menu{
            background:#1f2937;
            border:none;
        }

        .sidebar .user-menu .dropdown-item{
            color:#d1d5db;
        }

        .sidebar .user-menu .dropdown-item:hover{
            background:#22c55e;
            color:white;
        }

        /* CONTENIDO */
        .content{
            margin-left:260px;
            padding:30px;
        }
    </style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        🥯 Bollos App
    </div>

    <a href="/">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="/nuevo_cliente/">
        <i class="bi bi-bag-plus"></i> Registrar Clientes
    </a>
    <a href="/nuevo_pedido/">
        <i class="bi bi-bag-plus"></i> Registrar Pedido
    </a>
    <a href="/nueva_entrega/">
        <i class="bi bi-box-arrow-down"></i> Registrar Entrega
    </a>
    <a href="/registrar_gasto/">
        <i class="bi bi-cash-stack"></i> Registrar Gasto
    </a>
    <a href="/historial_entregas/">
        <i class="bi bi-journal-text"></i> Historial
    </a>
    <a href="/clientes/">
        <i class="bi bi-journal-text"></i> Lista de Clientes
    </a>
    <a href="/capital_base/">
        <i class="bi bi-journal-text"></i> Registrar Capital
    </a>

    <!-- MENÚ DE USUARIO -->
    <div class="user-menu dropdown">
        <button class="dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i> {{ request.user.get_full_name }}
        </button>
        <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/perfil/">⚙️ Configuración</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="/logout/">🚪 Salir</a></li>
        </ul>
    </div>

</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
